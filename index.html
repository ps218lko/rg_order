<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RG Order Entry</title>


<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
}


.container,
.login-container{

max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 3px 15px rgba(0,0,0,0.1);

}


.login-container{

max-width:400px;
margin:60px auto;

}


h1{

text-align:center;

}


label{

display:block;
font-weight:bold;
margin-top:15px;

}


input,
select{

width:100%;
padding:10px;
margin-top:5px;
box-sizing:border-box;
border:1px solid #ccc;
border-radius:6px;

}


input[readonly]{

background:#eee;

}



table{

width:100%;
border-collapse:collapse;
margin-top:25px;

}


th,
td{

border:1px solid #ddd;
padding:8px;
text-align:center;

}



th{

background:#f0f0f0;

}



.amount{

background:#fff8dc;

}



button{

width:100%;
padding:14px;
margin-top:25px;
border:none;
border-radius:6px;
background:#1976d2;
color:white;
font-size:17px;
cursor:pointer;

}



button:hover{

background:#125aa0;

}



button:disabled{

background:#999;

}



.logout-button{

background:#d32f2f;

}



#orderPage{

display:none;

}



#message,
#loginMessage{

text-align:center;
font-weight:bold;
margin-top:20px;

}



.user-welcome{

text-align:right;
color:#555;
margin-bottom:10px;

}



@media(max-width:600px){

table{

font-size:12px;

}


th,
td{

padding:5px;

}

}


</style>

</head>


<body>



<!-- ========================= -->
<!-- LOGIN PAGE -->
<!-- ========================= -->


<div id="loginPage" class="login-container">


<h1>
Login
</h1>



<label>
Username
</label>


<input
id="username"
type="text"
placeholder="Enter username">



<label>
Password
</label>


<input
id="password"
type="password"
placeholder="Enter password">



<button
id="loginButton"
onclick="loginUser()">

Login

</button>



<div id="loginMessage">

</div>


</div>





<!-- ========================= -->
<!-- ORDER PAGE -->
<!-- ========================= -->


<div id="orderPage">


<div class="container">


<div class="user-welcome">

Welcome

<strong id="loggedInName"></strong>

</div>



<button
class="logout-button"
onclick="logoutUser()">

Logout

</button>



<h1>
Customer Order Form
</h1>



<label>
Select Customer
</label>



<select id="clientSelect">

<option value="">
Select Customer
</option>

</select>





<label>
Wholesaler / SemiWholesaler
</label>


<input
id="clientType"
readonly>




<label>
Contact No
</label>


<input
id="contact"
readonly>




<label>
Address
</label>


<input
id="address"
readonly>




<h2>
Order Details
</h2>




<table>


<thead>

<tr>

<th>SKU</th>
<th>Rate</th>
<th>Whole</th>
<th>Loose</th>
<th>Qty</th>
<th>Amount</th>

</tr>


</thead>



<tbody id="skuTable">


</tbody>



</table>





<button
id="submitButton"
onclick="submitOrder()">

Submit Order

</button>




<div id="message">

</div>


</div>


</div>

<script>


// =====================================================
// APPS SCRIPT URL
// =====================================================


const API_URL =
"https://script.google.com/macros/s/AKfycbycaik6xQycLiRYZLe5-KeJqzguETBXDs4QHEZ-VvdEC3R6VS3WayqtqKcsX3EuyCXY/exec";





// =====================================================
// SKU LIST
// =====================================================


const SKUS=[


"RG2.20G",
"RG4.0G",
"RG17.0G",
"RG100.0G",

"RGS2.20G",
"RGM1.50G",

"TZ0.25G",
"TZ0.45G",
"TZ4.25G",
"TZ10.0G",
"TZ50.0G",

"KH5.75G",
"KH30.0G"

];






// =====================================================
// PACK SIZE
// CHANGE AS PER YOUR PACKING
// =====================================================


let PACK_SIZE={


"RG2.20G":20,
"RG4.0G":20,
"RG17.0G":20,
"RG100.0G":20,

"RGS2.20G":20,
"RGM1.50G":20,

"TZ0.25G":20,
"TZ0.45G":20,
"TZ4.25G":20,
"TZ10.0G":20,
"TZ50.0G":20,

"KH5.75G":20,
"KH30.0G":20


};




let clients=[];

let loggedInUser=null;





// =====================================================
// LOGIN USER
// =====================================================


function loginUser(){


const username=
document.getElementById("username")
.value.trim();


const password=
document.getElementById("password")
.value.trim();


const message=
document.getElementById("loginMessage");



if(username==="" || password===""){


message.innerHTML=
"Please enter username and password";


return;


}




message.innerHTML=
"Checking login...";



const callbackName=
"loginCallback_"+Date.now();





window[callbackName]=function(result){



if(result.success){



loggedInUser={

username:result.username,

name:result.name

};




sessionStorage.setItem(

"rgLoggedInUser",

JSON.stringify(loggedInUser)

);





document.getElementById(
"loggedInName"
).innerHTML=
result.name;




document.getElementById(
"loginPage"
).style.display="none";



document.getElementById(
"orderPage"
).style.display="block";




createSKUTable();

loadClients();



}

else{


message.innerHTML=
result.message || "Invalid Login";


}



delete window[callbackName];


};






let script=document.createElement("script");



script.src=

API_URL+

"?action=login"+

"&username="+
encodeURIComponent(username)+

"&password="+
encodeURIComponent(password)+

"&callback="+
callbackName;



document.body.appendChild(script);



}







// =====================================================
// CHECK SAVED LOGIN
// =====================================================


window.onload=function(){



let saved=
sessionStorage.getItem(
"rgLoggedInUser"
);



if(saved){



loggedInUser=
JSON.parse(saved);



document.getElementById(
"loggedInName"
).innerHTML=
loggedInUser.name;



document.getElementById(
"loginPage"
).style.display="none";



document.getElementById(
"orderPage"
).style.display="block";



createSKUTable();

loadClients();



}



};







// =====================================================
// LOGOUT
// =====================================================


function logoutUser(){



sessionStorage.removeItem(
"rgLoggedInUser"
);



location.reload();



}







// =====================================================
// LOAD CUSTOMERS
// =====================================================


async function loadClients(){



try{



const response=
await fetch(API_URL);



clients=
await response.json();



if(!Array.isArray(clients)){


throw new Error(
"Invalid customer data"
);


}




const select=
document.getElementById(
"clientSelect"
);




select.innerHTML=`

<option value="">
Select Customer
</option>

`;




clients.forEach(function(client,index){



let option=
document.createElement("option");



option.value=index;


option.textContent=
client.name;



select.appendChild(option);



});





}

catch(error){


console.log(error);


document.getElementById(
"message"
).innerHTML=
"Unable to load customers";


}



}








// =====================================================
// CREATE SKU TABLE
// =====================================================


function createSKUTable(){



const tbody=
document.getElementById(
"skuTable"
);



tbody.innerHTML="";





SKUS.forEach(function(sku){



let row=
document.createElement("tr");




row.innerHTML=`

<td>${sku}</td>


<td>

<input
type="number"
readonly
id="rate-${sku}">

</td>



<td>

<input
type="number"
min="0"
id="whole-${sku}"
oninput="calculateSKU('${sku}')">

</td>




<td>

<input
type="number"
min="0"
id="loose-${sku}"
oninput="calculateSKU('${sku}')">

</td>




<td>

<input
readonly
id="qty-${sku}">

</td>




<td>

<input
readonly
class="amount"
id="amount-${sku}">

</td>


`;




tbody.appendChild(row);



});



}
    

// =====================================================
// CUSTOMER SELECT CHANGE
// =====================================================


document
.getElementById("clientSelect")
.addEventListener(
"change",
function(){



const index=this.value;



if(index===""){


document.getElementById("clientType").value="";
document.getElementById("contact").value="";
document.getElementById("address").value="";


return;


}





const client=clients[index];





// CUSTOMER DETAILS


document.getElementById("clientType").value=
client.type || "";



document.getElementById("contact").value=
client.contact || "";



document.getElementById("address").value=
client.address || "";






// =====================================================
// LOAD CUSTOMER WISE RATE
// =====================================================


SKUS.forEach(function(sku){



let rate="";



if(client.rates && client.rates[sku] !== undefined){


rate=client.rates[sku];


}




document.getElementById(
"rate-"+sku
).value=rate;



});



});








// =====================================================
// CALCULATE SKU
// =====================================================


function calculateSKU(sku){



const whole=

Number(
document.getElementById(
"whole-"+sku
).value
)
||0;




const loose=

Number(
document.getElementById(
"loose-"+sku
).value
)
||0;





const pack=

Number(
PACK_SIZE[sku]
)
||1;





const rate=

Number(
document.getElementById(
"rate-"+sku
).value
)
||0;






// TOTAL LOOSE QUANTITY


const qty=

(whole * pack) + loose;





// RATE PER LOOSE


const looseRate=

rate / pack;





// AMOUNT


const amount=

qty * looseRate;






document.getElementById(
"qty-"+sku
).value=

qty || "";





document.getElementById(
"amount-"+sku
).value=

amount ? amount.toFixed(2) : "";




}









// =====================================================
// SUBMIT ORDER
// =====================================================


async function submitOrder(){



const index=

document.getElementById(
"clientSelect"
).value;




if(index===""){


alert(
"Please select customer"
);


return;


}






const client=
clients[index];





let orders={};

let hasOrder=false;






SKUS.forEach(function(sku){



const qty=

document.getElementById(
"qty-"+sku
).value;





if(qty!==""){


hasOrder=true;


}






orders[sku]={


whole:

document.getElementById(
"whole-"+sku
).value || "",




loose:

document.getElementById(
"loose-"+sku
).value || "",




qty:qty,




rate:

document.getElementById(
"rate-"+sku
).value || "",




amount:

document.getElementById(
"amount-"+sku
).value || ""



};




});







if(!hasOrder){


alert(
"Enter quantity for at least one SKU"
);


return;


}






const data={



name:
client.name,



type:
client.type,



contact:
client.contact,



address:
client.address,



orders:orders



};







const message=

document.getElementById(
"message"
);




const button=

document.getElementById(
"submitButton"
);





message.innerHTML=
"Submitting order...";



button.disabled=true;







try{



await fetch(

API_URL,

{

method:"POST",


mode:"no-cors",



headers:{


"Content-Type":

"text/plain;charset=utf-8"


},



body:

JSON.stringify(data)



}

);







message.innerHTML=
"Order submitted successfully";







// CLEAR AFTER SUBMIT


SKUS.forEach(function(sku){



document.getElementById(
"whole-"+sku
).value="";



document.getElementById(
"loose-"+sku
).value="";



document.getElementById(
"qty-"+sku
).value="";



document.getElementById(
"amount-"+sku
).value="";



});






}

catch(error){



console.log(error);



message.innerHTML=
"Order submission failed";



}

finally{


button.disabled=false;


}



}





</script>


</body>

</html>
