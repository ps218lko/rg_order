<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RG Order Entry</title>


<style>

body{

font-family:Arial,sans-serif;

background:#f4f6f8;

margin:0;

padding:20px;

}



.container,
.login-container{

max-width:900px;

margin:auto;

background:white;

padding:25px;

border-radius:12px;

box-shadow:0 3px 15px rgba(0,0,0,0.1);

}



.login-container{

max-width:400px;

margin:60px auto;

}



h1{

text-align:center;

}



label{

display:block;

font-weight:bold;

margin-top:15px;

}



input,
select{

width:100%;

padding:10px;

margin-top:5px;

box-sizing:border-box;

border:1px solid #ccc;

border-radius:6px;

}



input[readonly]{

background:#eee;

}



table{

width:100%;

border-collapse:collapse;

margin-top:25px;

}



th,
td{

border:1px solid #ddd;

padding:8px;

text-align:center;

}



th{

background:#f0f0f0;

}



.amount{

background:#fff8dc;

}



button{

width:100%;

padding:14px;

margin-top:25px;

border:none;

border-radius:6px;

background:#1976d2;

color:white;

font-size:17px;

cursor:pointer;

}



button:hover{

background:#125aa0;

}



button:disabled{

background:#999;

}



.logout-button{

background:#d32f2f;

}



#orderPage{

display:none;

}



#message,
#loginMessage{

text-align:center;

font-weight:bold;

margin-top:20px;

}



.user-welcome{

text-align:right;

color:#555;

margin-bottom:10px;

}



@media(max-width:600px){

table{

font-size:12px;

}


th,
td{

padding:5px;

}


}


</style>


</head>



<body>



<!-- ========================= -->
<!-- LOGIN PAGE -->
<!-- ========================= -->


<div id="loginPage"
class="login-container">


<h1>
Login
</h1>



<label>
Username
</label>


<input
id="username"
type="text"
placeholder="Enter username"
autocomplete="username">



<label>
Password
</label>


<input
id="password"
type="password"
placeholder="Enter password"
autocomplete="current-password">



<button
id="loginButton"
onclick="loginUser()">

Login

</button>



<div id="loginMessage">

</div>


</div>





<!-- ========================= -->
<!-- ORDER PAGE -->
<!-- ========================= -->


<div id="orderPage">


<div class="container">



<div class="user-welcome">

Welcome

<strong id="loggedInName">

</strong>

</div>




<button
class="logout-button"
onclick="logoutUser()">

Logout

</button>





<h1>
Customer Order Form
</h1>





<label>
Select Customer
</label>



<select id="clientSelect">

<option value="">
Select Customer
</option>

</select>





<label>
Wholesaler / SemiWholesaler
</label>


<input
id="clientType"
readonly>





<label>
Contact No
</label>


<input
id="contact"
readonly>





<label>
Address
</label>


<input
id="address"
readonly>





<h2>
Order Details
</h2>




<table>


<thead>

<tr>

<th>
SKU
</th>

<th>
Whole
</th>

<th>
Loose
</th>

<th>
Qty
</th>

<th>
Amount
</th>


</tr>

</thead>



<tbody id="skuTable">

</tbody>



</table>





<button
id="submitButton"
onclick="submitOrder()">

Submit Order

</button>




<div id="message">

</div>



</div>


</div>
<script>


// =====================================================
// APPS SCRIPT URL
// =====================================================

const API_URL =
"https://script.google.com/macros/s/AKfycbycaik6xQycLiRYZLe5-KeJqzguETBXDs4QHEZ-VvdEC3R6VS3WayqtqKcsX3EuyCXY/exec";




// =====================================================
// SKU LIST
// =====================================================

const SKUS = [

"RG2.20G",
"RG4.0G",
"RG17.0G",
"RG100.0G",

"RGS2.20G",
"RGM1.50G",

"TZ0.25G",
"TZ0.45G",
"TZ4.25G",
"TZ10.0G",
"TZ50.0G",

"KH5.75G",
"KH30.0G"

];





// =====================================================
// WHOLE CONVERSION
// CHANGE VALUES AS PER PACKING
// =====================================================

let PACK_SIZE = {};


let clients=[];

let loggedInUser=null;






// =====================================================
// LOGIN USER USING JSONP
// =====================================================

function loginUser(){



const username =
document.getElementById(
"username"
)
.value
.trim();



const password =
document.getElementById(
"password"
)
.value
.trim();



const message =
document.getElementById(
"loginMessage"
);



const button =
document.getElementById(
"loginButton"
);





if(
username==="" ||
password===""
){


message.textContent =
"Please enter username and password";


return;


}





message.textContent =
"Checking login...";


button.disabled=true;





const callbackName =
"loginCallback_"+Date.now();






window[callbackName]=function(result){



try{


if(result.success){



loggedInUser={

username:
result.username,

name:
result.name

};





sessionStorage.setItem(

"rgLoggedInUser",

JSON.stringify(
loggedInUser
)

);





document
.getElementById(
"loggedInName"
)
.textContent =
result.name;





document
.getElementById(
"loginPage"
)
.style.display="none";





document
.getElementById(
"orderPage"
)
.style.display="block";






createSKUTable();

loadClients();





}

else{


message.textContent =
result.message ||
"Invalid login";


}



}

catch(error){


console.log(error);


message.textContent =
"Login error";


}




button.disabled=false;


delete window[callbackName];



};






const script =
document.createElement(
"script"
);





script.src =

API_URL +

"?action=login" +

"&username="+
encodeURIComponent(username)+

"&password="+
encodeURIComponent(password)+

"&callback="+
callbackName;





script.onerror=function(){


message.textContent =
"Unable to connect server";


button.disabled=false;


delete window[callbackName];


};




document.body.appendChild(script);



}









// =====================================================
// CHECK SAVED LOGIN
// =====================================================


window.addEventListener(
"load",
function(){



const saved =
sessionStorage.getItem(
"rgLoggedInUser"
);





if(saved){



loggedInUser =
JSON.parse(saved);





document
.getElementById(
"loggedInName"
)
.textContent =
loggedInUser.name;





document
.getElementById(
"loginPage"
)
.style.display="none";





document
.getElementById(
"orderPage"
)
.style.display="block";





createSKUTable();

loadClients();




}



}

);







// =====================================================
// LOGOUT
// =====================================================


function logoutUser(){



sessionStorage.removeItem(
"rgLoggedInUser"
);



location.reload();



}

// =====================================================
// LOAD CUSTOMERS
// =====================================================

async function loadClients(){


try{


const response =
await fetch(API_URL);



clients =
await response.json();
console.log("ALL CLIENTS:", clients);

console.log(
"FIRST CLIENT RATE:",
clients[0].rates["RG2.20G"]
);


if(!Array.isArray(clients)){

throw new Error(
"Invalid customer data"
);

}



const select =
document.getElementById(
"clientSelect"
);



select.innerHTML = `

<option value="">
Select Customer
</option>

`;




clients.forEach(
function(client,index){



let option =
document.createElement(
"option"
);



option.value=index;


option.textContent =
client.name;



select.appendChild(
option
);



}

);



}

catch(error){


console.log(error);


document.getElementById(
"message"
).textContent =
"Unable to load customers";


}



}








// =====================================================
// CREATE SKU TABLE
// =====================================================


function createSKUTable(){



const tbody =
document.getElementById(
"skuTable"
);



if(tbody.children.length>0){

return;

}






SKUS.forEach(
function(sku){



let row =
document.createElement(
"tr"
);





row.innerHTML = `


<td>

${sku}

</td>




<td>

<input

type="number"

min="0"

id="whole-${sku}"

placeholder="Whole"

oninput="calculateSKU('${sku}')"

>

</td>





<td>

<input

type="number"

min="0"

id="loose-${sku}"

placeholder="Loose"

oninput="calculateSKU('${sku}')"

>

</td>






<td>

<input

readonly

id="qty-${sku}"

>

</td>






<td>


<!-- RATE HIDDEN FIELD -->

<input

type="hidden"

id="rate-${sku}"

>




<input

readonly

class="amount"

id="amount-${sku}"

>


</td>



`;




tbody.appendChild(row);



}

);



}









// =====================================================
// CUSTOMER SELECT CHANGE
// =====================================================


document
.getElementById(
"clientSelect"
)
.addEventListener(

"change",

function(){



const index =
this.value;





if(index===""){


document.getElementById(
"clientType"
).value="";


document.getElementById(
"contact"
).value="";


document.getElementById(
"address"
).value="";


return;


}





const client =
clients[index];





document.getElementById(
"clientType"
).value =
client.type || "";





document.getElementById(
"contact"
).value =
client.contact || "";





document.getElementById(
"address"
).value =
client.address || "";








// ==============================
// LOAD CUSTOMER RATE
// ==============================


SKUS.forEach(
function(sku){



const rate =
client.rates &&
client.rates[sku]
?
client.rates[sku]
:
0;





document.getElementById(
"rate-"+sku
).value =
rate;





}

);





}

);

// =====================================================
// CALCULATE SKU
// =====================================================

function calculateSKU(sku){


const whole =
Number(
document.getElementById("whole-"+sku).value
)||0;


const loose =
Number(
document.getElementById("loose-"+sku).value
)||0;



// Loose conversion from Master_SKU

const loosePerWhole =
Number(
PACK_SIZE[sku]
)
||1;



// Rate per whole

const wholeRate =
Number(
document.getElementById("rate-"+sku).value
)
||0;




// Total loose quantity

const qty =
(whole * loosePerWhole) + loose;




// Rate per loose

const looseRate =
wholeRate / loosePerWhole;



// Amount

const amount =
qty * looseRate;




document.getElementById(
"qty-"+sku
).value =
qty || "";



document.getElementById(
"amount-"+sku
).value =
amount
?
amount.toFixed(2)
:
"";


}



// =====================================================
// SUBMIT ORDER
// =====================================================

async function submitOrder(){



const index =
document.getElementById(
"clientSelect"
).value;





if(index===""){


alert(
"Please select customer"
);


return;


}





const client =
clients[index];






let orders={};


let hasOrder=false;







SKUS.forEach(
function(sku){



const whole =
document.getElementById(
"whole-"+sku
).value || "";




const loose =
document.getElementById(
"loose-"+sku
).value || "";




const qty =
document.getElementById(
"qty-"+sku
).value || "";




const rate =
document.getElementById(
"rate-"+sku
).value || "";




const amount =
document.getElementById(
"amount-"+sku
).value || "";







if(qty!==""){

hasOrder=true;

}






orders[sku]={


whole:whole,


loose:loose,


qty:qty,


rate:rate,


amount:amount


};



}

);








if(!hasOrder){


alert(
"Enter quantity for at least one SKU"
);


return;


}









const data={



name:
client.name,


type:
client.type,


contact:
client.contact,


address:
client.address,


orders:
orders



};







const message =
document.getElementById(
"message"
);




const button =
document.getElementById(
"submitButton"
);







message.textContent =
"Submitting order...";



button.disabled=true;








try{


await fetch(

API_URL,

{


method:"POST",


mode:"no-cors",



headers:{


"Content-Type":

"text/plain;charset=utf-8"


},



body:

JSON.stringify(
data
)



}

);







message.textContent =
"Order submitted successfully";







// CLEAR AFTER SAVE


SKUS.forEach(
function(sku){



document.getElementById(
"whole-"+sku
).value="";



document.getElementById(
"loose-"+sku
).value="";



document.getElementById(
"qty-"+sku
).value="";



document.getElementById(
"amount-"+sku
).value="";



}

);







}

catch(error){


console.log(error);



message.textContent =
"Order submission failed";


}

finally{


button.disabled=false;


}



}






</script>

</body>

</html>
